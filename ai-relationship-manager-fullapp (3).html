<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Relationship Manager Assistant</title>
<style>
  :root{
    --bg-app:#f8fafc; --bg-card:#ffffff; --border:#e2e8f0; --border-hover:#cbd5e1;
    --text:#0f172a; --muted:#64748b; --faint:#94a3b8; --hover:#f1f5f9;
    --active-bg:#eef2ff; --active-text:#4f46e5; --input-bg:#ffffff; --overlay:rgba(15,15,20,.45);
    --accent:#4f46e5; --accent-2:#7c3aed; --accent-hover:#4338ca;
    --emerald:#10b981; --amber:#f59e0b; --rose:#f43f5e;
    --badge-indigo-bg:#eef2ff; --badge-indigo-text:#4f46e5; --badge-indigo-border:#e0e7ff;
    --badge-emerald-bg:#ecfdf5; --badge-emerald-text:#059669; --badge-emerald-border:#d1fae5;
    --badge-amber-bg:#fffbeb; --badge-amber-text:#b45309; --badge-amber-border:#fef3c7;
    --badge-rose-bg:#fff1f2; --badge-rose-text:#e11d48; --badge-rose-border:#ffe4e6;
    --badge-slate-bg:#f1f5f9; --badge-slate-text:#475569; --badge-slate-border:#e2e8f0;
  }
  body.dark{
    --bg-app:#000000; --bg-card:#0f172a; --border:#1e293b; --border-hover:#334155;
    --text:#f8fafc; --muted:#94a3b8; --faint:#64748b; --hover:#1e293b;
    --active-bg:#1e1b4b; --active-text:#a5b4fc; --input-bg:#0f172a; --overlay:rgba(0,0,0,.65);
    --badge-indigo-bg:#1e1b4b; --badge-indigo-text:#a5b4fc; --badge-indigo-border:#312e81;
    --badge-emerald-bg:#022c22; --badge-emerald-text:#6ee7b7; --badge-emerald-border:#064e3b;
    --badge-amber-bg:#451a03; --badge-amber-text:#fcd34d; --badge-amber-border:#78350f;
    --badge-rose-bg:#4c0519; --badge-rose-text:#fda4af; --badge-rose-border:#881337;
    --badge-slate-bg:#1e293b; --badge-slate-text:#cbd5e1; --badge-slate-border:#334155;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg-app); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease,color .2s ease;
  }
  button,input,select,textarea{font-family:inherit; color:inherit;}
  button{cursor:pointer; border:none; background:none;}
  .icon{display:inline-block; vertical-align:middle; flex-shrink:0;}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* layout */
  #app{display:flex; min-height:100vh;}
  .sidebar{
    width:64px; flex-shrink:0; border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:20px 8px; background:var(--bg-app);
  }
  @media(min-width:768px){ .sidebar{ width:224px; padding:20px 16px; } }
  .sidebar-brand{display:flex; align-items:center; gap:10px; padding:0 6px; margin-bottom:32px;}
  .brand-icon{
    width:32px; height:32px; border-radius:10px; flex-shrink:0;
    background:linear-gradient(135deg,#6366f1,#7c3aed);
    display:flex; align-items:center; justify-content:center;
  }
  .brand-icon svg{color:#fff;}
  .brand-label{display:none; font-weight:600; font-size:14px;}
  @media(min-width:768px){ .brand-label{display:inline;} }
  .nav{display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:12px;
    font-size:14px; font-weight:500; color:var(--muted); width:100%; text-align:left;
    transition:background .15s,color .15s;
  }
  .nav-item:hover{ background:var(--hover); }
  .nav-item.active{ background:var(--active-bg); color:var(--active-text); }
  .nav-label{display:none;}
  @media(min-width:768px){ .nav-label{display:inline;} }
  .sidebar-foot{margin-top:auto; display:none; padding:12px 6px; font-size:12px; color:var(--faint); line-height:1.6;}
  @media(min-width:768px){ .sidebar-foot{display:block;} }

  .main-col{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    height:64px; border-bottom:1px solid var(--border); display:flex; align-items:center;
    justify-content:space-between; padding:0 24px; flex-shrink:0; position:relative;
  }
  .topbar-greeting{font-size:14px; font-weight:500;}
  .topbar-date{font-size:12px; color:var(--faint); margin-top:2px;}
  .topbar-actions{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    width:36px; height:36px; border-radius:999px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); position:relative; transition:background .15s;
  }
  .icon-btn:hover{ background:var(--hover); }
  .badge-dot{
    position:absolute; top:-1px; right:-1px; width:16px; height:16px; border-radius:999px;
    background:#f43f5e; color:#fff; font-size:10px; font-weight:600; display:flex; align-items:center; justify-content:center;
  }
  .avatar-me{
    width:36px; height:36px; border-radius:999px; background:linear-gradient(135deg,#6366f1,#7c3aed);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; margin-left:4px;
  }
  .bell-dropdown{
    position:absolute; right:24px; top:56px; width:320px; border-radius:16px; border:1px solid var(--border);
    background:var(--bg-card); box-shadow:0 20px 40px rgba(0,0,0,.15); z-index:30; padding:12px;
  }
  .bell-dropdown-title{font-size:12px; font-weight:600; color:var(--muted); padding:0 8px 8px;}
  .bell-item{padding:8px; border-radius:10px; font-size:12px;}
  .bell-item:hover{ background:var(--hover); }
  .bell-item b{font-weight:500; color:var(--text);}
  .bell-more{width:100%; text-align:center; font-size:12px; font-weight:500; color:var(--accent); padding:8px 0; margin-top:4px;}
  .bell-more:hover{ color:var(--accent-hover); }

  main{flex:1; overflow-y:auto; padding:24px;}

  /* generic */
  .flex{display:flex;}
  .flex-col{display:flex; flex-direction:column;}
  .items-center{align-items:center;}
  .items-start{align-items:flex-start;}
  .justify-between{justify-content:space-between;}
  .gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
  .flex-wrap{flex-wrap:wrap;}
  .min-w-0{min-width:0;}
  .flex-1{flex:1;}
  .truncate{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .text-xs{font-size:12px;} .text-sm{font-size:14px;} .text-base{font-size:16px;} .text-lg{font-size:18px;} .text-xl{font-size:20px;}
  .font-medium{font-weight:500;} .font-semibold{font-weight:600;}
  .muted{color:var(--muted);} .faint{color:var(--faint);}
  .mb-1{margin-bottom:4px;} .mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;}
  .mt-1{margin-top:4px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;}

  .card{
    border-radius:18px; border:1px solid var(--border); background:var(--bg-card); padding:20px;
    transition:border-color .15s;
  }
  .card:hover{ border-color:var(--border-hover); }
  .card-flat{padding:0; overflow:hidden;}
  .section-title{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .section-title-left{display:flex; align-items:center; gap:8px;}
  .section-title h3{margin:0; font-size:14px; font-weight:600;}

  .row-btn{
    display:flex; align-items:center; gap:12px; padding:8px; border-radius:12px; width:100%; text-align:left;
    transition:background .15s;
  }
  .row-btn:hover{ background:var(--hover); }
  .empty-row{padding:24px 0; text-align:center; font-size:14px; color:var(--faint);}

  .avatar{
    border-radius:999px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; flex-shrink:0;
  }
  .avatar-sm{width:32px; height:32px; font-size:12px;}
  .avatar-md{width:40px; height:40px; font-size:14px;}
  .avatar-lg{width:56px; height:56px; font-size:20px;}

  .badge{
    display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:999px; font-size:11px;
    font-weight:500; border:1px solid; white-space:nowrap;
  }
  .badge-indigo{ background:var(--badge-indigo-bg); color:var(--badge-indigo-text); border-color:var(--badge-indigo-border); }
  .badge-emerald{ background:var(--badge-emerald-bg); color:var(--badge-emerald-text); border-color:var(--badge-emerald-border); }
  .badge-amber{ background:var(--badge-amber-bg); color:var(--badge-amber-text); border-color:var(--badge-amber-border); }
  .badge-rose{ background:var(--badge-rose-bg); color:var(--badge-rose-text); border-color:var(--badge-rose-border); }
  .badge-slate{ background:var(--badge-slate-bg); color:var(--badge-slate-text); border-color:var(--badge-slate-border); }

  .btn{
    display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:500; padding:10px 16px;
    border-radius:12px; transition:background .15s,opacity .15s;
  }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-hover); }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-outline{ border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover{ background:var(--hover); }
  .btn-ghost{ color:var(--muted); }
  .btn-ghost:hover{ background:var(--hover); }

  input[type=text], input[type=date], input[type=search], select, textarea{
    font-size:14px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:var(--text);
    padding:8px 12px; outline:none; width:100%;
  }
  input:focus, select:focus, textarea:focus{ border-color:var(--accent); }
  textarea{ resize:none; }

  /* dashboard */
  .stats-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  @media(min-width:640px){ .stats-grid{grid-template-columns:repeat(3,1fr);} }
  @media(min-width:1024px){ .stats-grid{grid-template-columns:repeat(6,1fr);} }
  .dash-grid{display:grid; grid-template-columns:1fr; gap:16px;}
  @media(min-width:1024px){ .dash-grid{grid-template-columns:2fr 1fr;} }
  .hero-card{
    border-radius:18px; padding:24px; color:#fff;
    background:linear-gradient(135deg,#4f46e5,#4f46e5 40%,#7c3aed);
  }
  .hero-card .hero-tag{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; letter-spacing:.02em; margin-bottom:10px;}
  .hero-card p{font-size:18px; line-height:1.6; font-weight:500; max-width:640px; margin:0;}
  .hero-btn{
    margin-top:16px; font-size:13px; background:rgba(255,255,255,.16); padding:8px 16px; border-radius:999px; font-weight:500; color:#fff;
  }
  .hero-btn:hover{ background:rgba(255,255,255,.26); }
  .cards-grid{display:grid; grid-template-columns:1fr; gap:16px; margin-top:16px;}
  @media(min-width:768px){ .cards-grid{grid-template-columns:1fr 1fr;} }
  @media(min-width:1280px){ .cards-grid{grid-template-columns:1fr 1fr 1fr;} }
  .todo-list{display:flex; flex-direction:column; gap:2px; overflow-y:auto; max-height:224px;}
  .todo-item{display:flex; align-items:center; gap:8px; padding:8px; border-radius:10px; text-align:left; width:100%;}
  .todo-item:hover{ background:var(--hover); }
  .todo-name{flex:1; font-size:14px;}
  .todo-done{ text-decoration:line-through; color:var(--faint); }
  .todo-time{font-size:12px; color:var(--faint);}

  /* customers */
  .toolbar{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .search-box{
    display:flex; align-items:center; gap:8px; border:1px solid var(--border); border-radius:12px;
    padding:8px 12px; flex:1; min-width:220px; background:var(--input-bg);
  }
  .search-box input{border:none; padding:0; background:transparent;}
  .search-box input:focus{border:none;}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  thead tr{border-bottom:1px solid var(--border);}
  th{text-align:left; font-weight:500; color:var(--muted); padding:12px 16px; font-size:13px;}
  td{padding:12px 16px; border-bottom:1px solid var(--border);}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{ background:var(--hover); }
  .col-hide-sm{display:none;} @media(min-width:640px){ .col-hide-sm{display:table-cell;} }
  .col-hide-md{display:none;} @media(min-width:768px){ .col-hide-md{display:table-cell;} }
  .col-hide-lg{display:none;} @media(min-width:1024px){ .col-hide-lg{display:table-cell;} }
  .link-btn{color:var(--accent); font-size:14px; font-weight:500; display:inline-flex; align-items:center; gap:2px;}
  .link-btn:hover{ color:var(--accent-hover); }

  /* customer detail */
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .stat-card{text-align:center; padding:16px;}
  .stat-label{font-size:12px; color:var(--faint);}
  .stat-value{font-size:18px; font-weight:600; margin-top:4px;}
  .tags-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); overflow-x:auto;}
  .tab-btn{
    padding:10px 16px; font-size:14px; font-weight:500; border-bottom:2px solid transparent; margin-bottom:-1px;
    color:var(--muted); white-space:nowrap;
  }
  .tab-btn.active{ border-color:var(--accent); color:var(--accent); }
  .tab-btn:hover:not(.active){ color:var(--text); }
  .info-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; font-size:14px;}
  @media(max-width:480px){ .info-grid{grid-template-columns:1fr;} }
  .info-grid .span-2{grid-column:1 / -1;}
  .info-label{font-size:12px; color:var(--faint); margin-bottom:4px;}
  .product-row{display:flex; align-items:center; justify-content:space-between; padding:12px; border:1px solid var(--border); border-radius:14px; margin-bottom:10px;}
  .timeline-item{display:flex; gap:12px;}
  .timeline-dot-col{display:flex; flex-direction:column; align-items:center;}
  .timeline-dot{width:10px; height:10px; border-radius:999px; background:var(--accent); margin-top:6px;}
  .timeline-line{width:1px; flex:1; background:var(--border);}
  .insight-row{display:flex; gap:12px; padding:12px; border:1px solid var(--border); border-radius:14px; margin-bottom:10px;}
  .followup-row{display:flex; align-items:center; justify-content:space-between; padding:12px; border:1px solid var(--border); border-radius:14px; margin-bottom:10px;}

  /* modal */
  .modal-overlay{
    position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; padding:16px;
    background:var(--overlay);
  }
  .modal-box{
    width:100%; max-width:520px; max-height:90vh; display:flex; flex-direction:column;
    border-radius:18px; border:1px solid var(--border); background:var(--bg-card); box-shadow:0 30px 60px rgba(0,0,0,.25);
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border);}
  .modal-body{padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px;}
  .modal-foot{display:flex; justify-content:flex-end; gap:8px; padding:16px 20px; border-top:1px solid var(--border);}
  .field-label{font-size:12px; font-weight:500; color:var(--faint); display:block; margin-bottom:6px;}
  .ai-result-box{border:1px solid var(--border); border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:12px;}
  .ai-result-title{font-size:12px; font-weight:600; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  /* reminders */
  .chip{
    padding:6px 14px; border-radius:999px; font-size:14px; font-weight:500; border:1px solid var(--border); color:var(--muted);
  }
  .chip:hover{ background:var(--hover); }
  .chip.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .reminder-row{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border);}
  .reminder-row:last-child{ border-bottom:none; }

  /* settings */
  .toggle{width:48px; height:28px; border-radius:999px; padding:2px; display:flex; align-items:center; background:#cbd5e1; transition:background .15s;}
  .toggle.on{ background:var(--accent); justify-content:flex-end; }
  .toggle:not(.on){ justify-content:flex-start; }
  .toggle-dot{width:20px; height:20px; border-radius:999px; background:#fff; display:block;}
  input[type=range]{ accent-color:var(--accent); width:100%; }

  /* calendar */
  .cal-legend{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .cal-legend-item{display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);}
  .cal-dot{width:8px; height:8px; border-radius:999px;}
  .cal-grid{display:grid; grid-template-columns:1fr; gap:16px;}
  @media(min-width:1024px){ .cal-grid{grid-template-columns:2fr 1fr;} }
  .cal-weekdays{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px;}
  .cal-weekday{text-align:center; font-size:12px; font-weight:500; color:var(--faint); padding:6px 0;}
  .cal-days{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-day{
    height:64px; border-radius:12px; border:1px solid transparent; padding:6px; display:flex; flex-direction:column;
    gap:4px; align-items:flex-start; text-align:left; transition:background .15s,border-color .15s;
  }
  @media(min-width:640px){ .cal-day{ height:80px; } }
  .cal-day:hover{ background:var(--hover); }
  .cal-day.selected{ border-color:var(--accent); background:var(--active-bg); }
  .cal-day.out{ opacity:.35; }
  .cal-day-num{
    width:20px; height:20px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500;
  }
  .cal-day-num.today{ background:var(--accent); color:#fff; }
  .cal-dots{display:flex; flex-wrap:wrap; gap:2px;}
  .cal-dots span{width:6px; height:6px; border-radius:999px;}
  .cal-more{font-size:10px; color:var(--faint);}

  /* assistant */
  .assistant-fab{
    position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:999px; z-index:40;
    background:linear-gradient(135deg,#6366f1,#7c3aed); color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 16px 32px rgba(79,70,229,.35); transition:transform .15s;
  }
  .assistant-fab:hover{ transform:scale(1.06); }
  .assistant-panel{
    position:fixed; bottom:92px; right:24px; width:340px; height:440px; border-radius:18px; z-index:40;
    border:1px solid var(--border); background:var(--bg-card); box-shadow:0 30px 60px rgba(0,0,0,.25);
    display:flex; flex-direction:column; overflow:hidden;
  }
  @media(max-width:420px){ .assistant-panel{ width:calc(100vw - 32px); right:16px; } }
  .assistant-head{display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); font-size:14px; font-weight:600;}
  .assistant-msgs{flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:10px;}
  .msg-row{display:flex;}
  .msg-row.user{ justify-content:flex-end; }
  .msg-bubble{max-width:85%; font-size:13px; padding:8px 12px; border-radius:16px; line-height:1.5;}
  .msg-bubble.ai{ background:var(--hover); color:var(--text); }
  .msg-bubble.user{ background:var(--accent); color:#fff; }
  .assistant-input-row{display:flex; align-items:center; gap:8px; padding:10px; border-top:1px solid var(--border);}
  .assistant-input-row input{ border:none; background:transparent; flex:1; }
  .assistant-input-row input:focus{ border:none; }
  .send-btn{width:32px; height:32px; border-radius:999px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .send-btn:hover{ background:var(--accent-hover); }

  /* login */
  .login-brand{
    display:none; width:50%; position:relative; flex-direction:column; justify-content:space-between;
    padding:48px; color:#fff; overflow:hidden;
    background:linear-gradient(135deg,#4f46e5,#4338ca 45%,#5b21b6);
  }
  @media(min-width:1024px){ .login-brand{ display:flex; } }
  .login-brand-dots{
    position:absolute; inset:0; opacity:.18;
    background-image:radial-gradient(circle at 20% 20%, #fff 1px, transparent 1px);
    background-size:28px 28px;
  }
  .login-brand-mobile{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:32px; }
  @media(min-width:1024px){ .login-brand-mobile{ display:none; } }

  /* toast */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:50;
    background:#0f172a; color:#fff; font-size:14px; font-weight:500; padding:10px 18px; border-radius:999px;
    box-shadow:0 20px 40px rgba(0,0,0,.25); display:flex; align-items:center; gap:8px;
  }
</style>
</head>

function getSuggestions(customers, followUps, staleDays){
  const results = [];
  customers.forEach(c => {
    let score = 0; const reasons = [];
    const daysSince = -daysFromToday(c.lastContact);
    if(daysSince >= staleDays){ score += daysSince; reasons.push(`已 ${daysSince} 天未聯繫`); }
    c.products.forEach(p => {
      if((p.type === "定存" || p.type === "基金") && p.maturity){
        const d = daysFromToday(p.maturity);
        if(d >= -3 && d <= 7){ score += (7-d)*8; reasons.push(d<=0 ? `${p.name} 已到期` : `${p.name} ${d} 天後到期`); }
      }
      if(p.type === "ETF" && p.changePct && Math.abs(p.changePct) >= 5){
        score += Math.abs(p.changePct)*3;
        reasons.push(`${p.name} 近期${p.changePct>0?"上漲":"下跌"} ${Math.abs(p.changePct)}%`);
      }
    });
    if(c.birthdayDate){
      const d = daysFromToday(c.birthdayDate);
      if(d >= 0 && d <= 7){ score += (7-d)*5; reasons.push(d===0 ? "今天生日" : `${d} 天後生日`); }
    }
    followUps.filter(f => f.customerId === c.id && f.status === "pending").forEach(f => {
      const d = daysFromToday(f.dueDate);
      if(d <= 1){
        score += d < 0 ? 60 : 40;
        reasons.push(d<0 ? `Follow Up 已逾期 ${-d} 天` : d===0 ? "Follow Up 今天到期" : "Follow Up 明天到期");
      }
    });
    if(score > 0) results.push({ customer:c, score, reasons });
  });
  return results.sort((a,b) => b.score - a.score);
}

function getReminders(customers, followUps, staleDays){
  const birthdays=[], cdMaturity=[], fundMaturity=[], etf=[], stale=[];
  customers.forEach(c => {
    const d = daysFromToday(c.birthdayDate);
    if(d >= 0 && d <= 7) birthdays.push({ customer:c, days:d });
    c.products.forEach(p => {
      if(p.maturity){
        const md = daysFromToday(p.maturity);
        if(md >= -3 && md <= 7){
          if(p.type === "定存") cdMaturity.push({ customer:c, product:p, days:md });
          if(p.type === "基金") fundMaturity.push({ customer:c, product:p, days:md });
        }
      }
      if(p.type === "ETF" && p.changePct && Math.abs(p.changePct) >= 5) etf.push({ customer:c, product:p });
    });
    const daysSince = -daysFromToday(c.lastContact);
    if(daysSince >= staleDays) stale.push({ customer:c, days:daysSince });
  });
  const pendingFollowUps = followUps.filter(f => f.status === "pending")
    .map(f => ({ followUp:f, customer:customers.find(c => c.id === f.customerId), days:daysFromToday(f.dueDate) }))
    .sort((a,b) => a.days - b.days);
  return {
    birthdays: birthdays.sort((a,b)=>a.days-b.days),
    cdMaturity: cdMaturity.sort((a,b)=>a.days-b.days),
    fundMaturity: fundMaturity.sort((a,b)=>a.days-b.days),
    etf, stale: stale.sort((a,b)=>b.days-a.days),
    followUps: pendingFollowUps,
  };
}

function generateAISummary(rawText){
  const trimmed = rawText.trim();
  const summary = trimmed.length > 0 ? trimmed.slice(0,90) + (trimmed.length>90 ? "…" : "") : "（尚未輸入通話內容）";
  const needs = [];
  if(/ETF|0050|0056|00878/.test(rawText)) needs.push("ETF加碼意願");
  if(/退休/.test(rawText)) needs.push("退休規劃需求");
  if(/基金/.test(rawText)) needs.push("基金轉換／贖回需求");
  if(/保單|保險/.test(rawText)) needs.push("保單相關需求");
  if(/定存/.test(rawText)) needs.push("定存續存意願");
  if(/教育金|子女/.test(rawText)) needs.push("子女教育金規劃");
  if(needs.length === 0) needs.push("一般關係維繫");
  const reaction = /不滿|抱怨|不高興|拒絕/.test(rawText) ? "保留" : /考慮|再想想|再看看/.test(rawText) ? "中立" : "正面";
  return { summary, needs, reaction };
}

const WEEKDAYS = ["日","一","二","三","四","五","六"];
function pad2(n){ return String(n).padStart(2,"0"); }
function toKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function buildCalendarDays(year, month){
  const startWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
  const days = [];
  for(let i=0;i<totalCells;i++){
    const dayNum = i - startWeekday + 1;
    const d = new Date(year, month, dayNum);
    days.push({ date:d, key:toKey(d), inMonth: d.getMonth() === month });
  }
  return days;
}
const EVENT_STYLE = {
  followup: { color:"var(--accent)", badge:"indigo", label:"Follow Up" },
  birthday: { color:"var(--amber)", badge:"amber", label:"生日" },
  maturity: { color:"var(--rose)", badge:"rose", label:"商品到期" },
  call:     { color:"var(--emerald)", badge:"emerald", label:"通話紀錄" },

function buildCalendarEvents(customers, followUps){
  const map = {};
  const push = (dateStr, ev) => { if(!dateStr) return; if(!map[dateStr]) map[dateStr]=[]; map[dateStr].push(ev); };
  customers.forEach(c => {
    push(c.birthdayDate, { type:"birthday", customerId:c.id, text:`${c.name}・生日` });
    c.products.forEach(p => { if(p.maturity) push(p.maturity, { type:"maturity", customerId:c.id, text:`${c.name}・${p.name} 到期` }); });
    c.callLogs.forEach(log => push(log.date, { type:"call", customerId:c.id, text:`${c.name}・通話紀錄` }));
  });
  followUps.forEach(f => {
    const c = customers.find(x => x.id === f.customerId);
    if(c) push(f.dueDate, { type:"followup", customerId:c.id, text:`${c.name}・${f.content}` });
  });
  return map;
}

  const cls = size === "sm" ? "avatar-sm" : size === "lg" ? "avatar-lg" : "avatar-md";
  return `<div class="avatar ${cls}" style="background:${AVATAR_COLORS[idx]}">${esc(name.slice(0,1))}</div>`;
}
function badgeHTML(text, color){
  return `<span class="badge badge-${color||"slate"}">${text}</span>`;
}

function doLogin(e){
  e.preventDefault();
  state.loginError = "";
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const rememberMe = document.getElementById("loginRemember").checked;

  if(email === DEMO_ACCOUNT.email && password === DEMO_ACCOUNT.password){

      email, name:DEMO_ACCOUNT.name, branch:DEMO_ACCOUNT.branch,
      token:"demo-mock-token-" + Date.now(),
      rememberMe,
      loginAt: Date.now(),
    };
    try{ localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(authPayload)); } catch {}
    state.authUser = authPayload;
    state.view = "dashboard";
    render();
  } else {
    state.loginError = "帳號或密碼錯誤，請確認後再試一次";
    renderLoginError();
  }

  const el = document.getElementById("loginErrorWrap");

function quickLogin(){
  const authPayload = {

    token:"demo-mock-token-" + Date.now(),
    rememberMe:true,
    loginAt: Date.now(),
  };
  try{ localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(authPayload)); } catch {}
  state.authUser = authPayload;
  state.view = "dashboard";
  render();
}
function logout(){
  try{ localStorage.removeItem(AUTH_STORAGE_KEY); } catch {}
  state.authUser = null;
  state.view = "dashboard";
  showToast("已登出");
  render();
}

function showToast(msg){
  state.toastMsg = msg;

}

  document.getElementById("toastWrap").innerHTML = state.toastMsg

function filteredCustomers(){
  const { q, risk, sort } = state.custFilter;
  let list = state.customers.filter(c => c.name.includes(q) || c.occupation.includes(q));
  if(risk !== "全部") list = list.filter(c => c.risk === risk);
  if(sort === "資產規模") list = [...list].sort((a,b) => b.asset - a.asset);
  if(sort === "最近聯絡") list = [...list].sort((a,b) => daysFromToday(a.lastContact) - daysFromToday(b.lastContact));
  return list;
}
function renderCustomerRows(list){
  if(list.length === 0) return `<tr><td colspan="6"><div class="empty-row">沒有符合條件的客戶</div></td></tr>`;
  return list.map(c => {
    const days = -daysFromToday(c.lastContact);
    return `
      <tr>
        <td><div class="flex items-center gap-3">${avatarHTML(c.name,"sm")}<div><p class="font-medium">${esc(c.name)}</p><p class="text-xs faint">${c.age} 歲・${esc(c.occupation)}</p></div></div></td>
        <td class="col-hide-sm">${fmtMoney(c.asset)}</td>
        <td class="col-hide-md">${badgeHTML(c.risk+" · "+c.style, riskColor(c.risk))}</td>

        <td style="text-align:right;"><button class="link-btn" onclick="openCustomer(${c.id})">查看 ${icon("chevronRight",14)}</button></td>
      </tr>`;
  }).join("");
}

let remindersTab = "all";
function setRemindersTab(t){ remindersTab = t; render(); }

function renderReminders(){
  const reminders = getReminders(state.customers, state.followUps, state.staleDays);
  const rows = [];
  reminders.followUps.forEach(r => rows.push({ type:"followup", customer:r.customer, days:r.days, text:r.followUp.content, followUpId:r.followUp.id }));
  reminders.birthdays.forEach(r => rows.push({ type:"birthday", customer:r.customer, days:r.days, text:"生日提醒" }));
  reminders.cdMaturity.forEach(r => rows.push({ type:"maturity", customer:r.customer, days:r.days, text:`定存到期：${r.product.name}` }));
  reminders.fundMaturity.forEach(r => rows.push({ type:"maturity", customer:r.customer, days:r.days, text:`基金到期：${r.product.name}` }));
  reminders.stale.forEach(r => rows.push({ type:"stale", customer:r.customer, days:-r.days, text:`已 ${r.days} 天未聯繫` }));
  rows.sort((a,b) => a.days - b.days);

  const tabs = [["all","全部"],["followup","Follow Up"],["birthday","生日"],["maturity","商品到期"],["stale","久未聯繫"]];
  const filtered = remindersTab==="all" ? rows : rows.filter(r => r.type===remindersTab);

  const urgency = (days) => {
    if(days < 0) return { color:"rose", label:`已逾期 ${-days} 天` };
    if(days === 0) return { color:"rose", label:"今天" };
    if(days <= 3) return { color:"amber", label:relativeDay(days) };
    return { color:"slate", label:relativeDay(days) };
  };

  const rowsHTML = filtered.length===0 ? `<div class="empty-row">這個分類目前沒有提醒</div>` :
    filtered.map(r => {
      const u = urgency(r.days);
      return `
        <div class="reminder-row">
          <button class="row-btn" style="padding:0;" onclick="openCustomer(${r.customer.id})">
            ${avatarHTML(r.customer.name,"sm")}
            <div class="min-w-0"><p class="text-sm font-medium">${esc(r.customer.name)}</p><p class="text-xs muted truncate">${esc(r.text)}</p></div>
          </button>
          <div class="flex items-center gap-3">
            ${badgeHTML(u.label, u.color)}
            ${r.type==="followup"?`<button class="link-btn" style="font-size:12px;" onclick="completeFollowUp(${r.followUpId})">標記完成</button>`:""}
          </div>
        </div>`;
    }).join("");

  return `
    <div class="flex-col gap-4">
      <h2 class="text-xl font-semibold" style="margin:0;">提醒中心</h2>
      <div class="flex gap-2 flex-wrap">${tabs.map(([k,l]) => `<button class="chip ${remindersTab===k?"active":""}" onclick="setRemindersTab('${k}')">${l}</button>`).join("")}</div>
      <div class="card card-flat">${rowsHTML}</div>
    </div>`;
}

const AI_ACTIONS = [
  { key:"analyze", label:"分析客戶", icon:"users" },
  { key:"opener", label:"產生聊天開場", icon:"message" },
  { key:"allocation", label:"分析資產配置", icon:"wallet" },
  { key:"risk", label:"分析客戶風險", icon:"trending" },
  { key:"product", label:"推薦適合商品", icon:"sparkles" },
  { key:"followup", label:"產生 Follow Up 建議", icon:"clock" },
];

function generateAIAnalysis(customer, type){
  const totalAmt = customer.products.reduce((s,p)=>s+p.amount,0);
  const byType = {};
  customer.products.forEach(p => { byType[p.type] = (byType[p.type]||0) + p.amount; });
  const allocLines = Object.entries(byType).map(([t,amt]) => `${t} ${fmtMoney(amt)}（約 ${Math.round(amt/totalAmt*100)}%）`).join("、");

  if(type === "analyze"){
    return `${customer.name}（${customer.age}歲・${customer.occupation}）目前資產規模約 ${fmtMoney(customer.asset)}，風險屬性 ${customer.risk}／${customer.style}。`
      + `根據近 ${customer.callLogs.length} 次通話紀錄，AI 歸納出的標籤為：${customer.tags.join("、")}。`
      + `${customer.note} 建議下次聯繫時延續這個方向切入，會比從零開始更容易建立信任感。`;
  }
  if(type === "opener"){
    return customer.chatSuggestions.map((s,i)=>`${i+1}. ${s}`).join("\n");
  }
  if(type === "allocation"){
    return `${customer.name} 目前持有商品總額約 ${fmtMoney(totalAmt)}：${allocLines}。`
      + (Object.keys(byType).length <= 1
          ? " 目前配置較集中在單一類型商品，可評估是否適度分散以降低集中度風險。"
          : " 配置涵蓋多種商品類型，屬於相對分散的組合，可視市場狀況微調比重。");
  }
  if(type === "risk"){
    const riskNote = {
      RR2:"風險承受度偏保守，適合以保本、穩定收益型商品為主，避免高波動部位占比過高。",
      RR3:"風險承受度中等，可在核心穩健部位之外，搭配少量成長型資產拉高報酬空間。",
      RR4:"風險承受度中高，具備一定的波動承受能力，可適度提高股票／ETF部位。",
      RR5:"風險承受度高，可承受較大波動，但仍建議定期檢視部位集中度，避免單一標的曝險過高。",
    };
    return `${customer.name} 的風險屬性為 ${customer.risk}（${customer.style}）。${riskNote[customer.risk]||""}`;
  }
  if(type === "product"){
    const hasETF = customer.products.some(p=>p.type==="ETF");
    const hasFund = customer.products.some(p=>p.type==="基金");
    const hasCD = customer.products.some(p=>p.type==="定存");
    const recs = [];
    if(customer.risk==="RR2") recs.push("高利活存／短天期定存", "保本型結構商品");
    else if(customer.risk==="RR3") recs.push("平衡型基金", "投資等級債券ETF");
    else recs.push("高股息ETF", "全球型股票基金");
    if(!hasETF) recs.push("可介紹一檔核心市值型ETF作為入門部位");
    if(hasCD && !hasFund) recs.push("定存到期時可討論轉換部分資金至穩健型基金，爭取更高報酬");
    return `根據 ${customer.name} 的風險屬性與現有持有商品，建議可介紹：${recs.join("、")}。`;
  }
  if(type === "followup"){
    const pending = state.followUps.filter(f=>f.customerId===customer.id && f.status==="pending");
    if(pending.length>0){
      return `${customer.name} 目前有 ${pending.length} 筆待處理 Follow Up：${pending.map(f=>f.content).join("、")}。建議本週優先處理，避免逾期影響客戶信任感。`;
    }
    return `${customer.name} 目前沒有待處理的 Follow Up。建議可依「今天可以聊什麼」的建議主動安排下一次聯繫，並在通話後建立新的 Follow Up 追蹤。`;
  }
  return "";
}

function renderCalendar(){
  const events = buildCalendarEvents(state.customers, state.followUps);
  const days = buildCalendarDays(state.cal.year, state.cal.month);
  const todayKey = toKey(TODAY);

  const legend = Object.entries(EVENT_STYLE).map(([k,s]) =>
    `<span class="cal-legend-item"><span class="cal-dot" style="background:${s.color}"></span>${s.label}</span>`).join("");

  const weekdayRow = WEEKDAYS.map(w => `<div class="cal-weekday">${w}</div>`).join("");
  const dayCells = days.map(d => {
    const evs = events[d.key] || [];
    const isToday = d.key === todayKey;
    const isSelected = d.key === state.cal.selectedKey;
    const dots = evs.slice(0,3).map(ev => `<span style="background:${EVENT_STYLE[ev.type].color}"></span>`).join("");
    const more = evs.length>3 ? `<span class="cal-more">+${evs.length-3}</span>` : "";
    return `
      <button class="cal-day ${isSelected?"selected":""} ${!d.inMonth?"out":""}" onclick="selectCalDay('${d.key}')">
        <span class="cal-day-num ${isToday?"today":""}">${d.date.getDate()}</span>
        <div class="cal-dots">${dots}${more}</div>
      </button>`;
  }).join("");

  const selEvents = events[state.cal.selectedKey] || [];
  const selDate = new Date(state.cal.selectedKey+"T00:00:00");
  const selLabel = `${selDate.getMonth()+1} 月 ${selDate.getDate()} 日`;
  const eventList = selEvents.length===0 ? `<div class="empty-row">這天沒有排定的事件</div>` :
    selEvents.map(ev => {
      const s = EVENT_STYLE[ev.type];
      const c = findCustomer(ev.customerId);
      return `
        <button class="row-btn" onclick="openCustomer(${ev.customerId})">
          ${avatarHTML(c.name,"sm")}
          <div class="min-w-0 flex-1">
            <div class="flex items-center justify-between gap-2"><p class="text-sm font-medium truncate">${esc(c.name)}</p>${badgeHTML(s.label, s.badge)}</div>
            <p class="text-xs muted truncate mt-1">${esc(ev.text)}</p>
          </div>
        </button>`;
    }).join("");

  return `
    <div class="flex-col gap-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <h2 class="text-xl font-semibold" style="margin:0;">行事曆</h2>
        <div class="cal-legend">${legend}</div>
      </div>
      <div class="cal-grid">
        <div class="card">
          <div class="flex items-center justify-between mb-4">
            <p class="text-base font-semibold">${state.cal.year} 年 ${state.cal.month+1} 月</p>
            <div class="flex items-center gap-1">
              <button class="icon-btn" onclick="changeCalMonth(-1)">${icon("chevronLeft",16)}</button>
              <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="gotoCalToday()">回到今天</button>
              <button class="icon-btn" onclick="changeCalMonth(1)">${icon("chevronRight",16)}</button>
            </div>
          </div>
          <div class="cal-weekdays">${weekdayRow}</div>
          <div class="cal-days">${dayCells}</div>
        </div>
        <div class="card">
          <div class="section-title"><div class="section-title-left">${icon("calendar",16)}<h3>${selLabel} 的行程</h3></div></div>
          <div class="flex-col gap-1" style="max-height:384px;overflow-y:auto;">${eventList}</div>
        </div>
      </div>
    </div>`;
}

/* ================================================================== */
/* 新增通話紀錄 Modal                                                    */
/* ================================================================== */

function renderModal(){
  if(!state.modalOpen) return "";
  const c = findCustomer(state.selectedId);
  if(!c) return "";
  return `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h3 class="text-sm font-semibold" style="margin:0;">新增通話紀錄・${esc(c.name)}</h3>
          <button class="icon-btn" onclick="closeModal()">${icon("x",16)}</button>
        </div>
        <div class="modal-body">
          <div>
            <label class="field-label">通話日期</label>
            <input type="date" id="clDate" value="2026-07-17" />
          </div>
          <div>
            <label class="field-label">通話內容（貼上或輸入原始筆記）</label>
            <textarea id="clRaw" rows="4" placeholder="例如：今天跟客戶聊到 ETF 加碼意願，也提到子女教育金規劃需求，客戶反應正面……"></textarea>
          </div>
          <button class="btn btn-primary" id="aiBtn" style="justify-content:center;" onclick="runAI()">${icon("sparkles",16)}AI 整理摘要</button>
          <div id="aiResultWrap"></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" disabled onclick="saveCallLog()">儲存紀錄</button>
        </div>
      </div>
    </div>`;
}

function runAI(){
  const raw = document.getElementById("clRaw").value;
  if(!raw.trim()) return;
  const btn = document.getElementById("aiBtn");
  btn.disabled = true;
  btn.innerHTML = icon("loader",16) + "AI 整理中…";
  setTimeout(() => {
    const r = generateAISummary(raw);
    state.aiResult = { summary:r.summary, needs:r.needs.join("、"), reaction:r.reaction, nextContact:"2026-08-01", followUp:`${r.needs[0]}：後續追蹤與確認` };
    btn.disabled = false;
    btn.innerHTML = icon("sparkles",16) + "AI 整理摘要";
    document.getElementById("aiResultWrap").innerHTML = renderAIResult();
    document.getElementById("saveBtn").disabled = false;
  }, 900);
}

function renderAIResult(){
  const r = state.aiResult;
  if(!r) return "";
  return `
    <div class="ai-result-box">
      <p class="ai-result-title">${icon("sparkles",13,"color:var(--accent)")}AI 整理結果（可編輯）</p>
      <div><label class="field-label">摘要</label><textarea id="clSummary" rows="2">${esc(r.summary)}</textarea></div>
      <div><label class="field-label">客戶需求</label><input type="text" id="clNeeds" value="${esc(r.needs)}" /></div>
      <div class="two-col">
        <div><label class="field-label">客戶反應</label>
          <select id="clReaction">${["正面","中立","保留"].map(x=>`<option ${r.reaction===x?"selected":""}>${x}</option>`).join("")}</select>
        </div>
        <div><label class="field-label">下次聯絡時間</label><input type="date" id="clNext" value="${r.nextContact}" /></div>
      </div>
      <div><label class="field-label">Follow Up</label><input type="text" id="clFollowUp" value="${esc(r.followUp)}" /></div>
    </div>`;
}

function saveCallLog(){
  if(!state.aiResult) return;
  const date = document.getElementById("clDate").value;
  const summary = document.getElementById("clSummary").value;
  const needs = document.getElementById("clNeeds").value.split("、").filter(Boolean);
  const reaction = document.getElementById("clReaction").value;
  const nextContact = document.getElementById("clNext").value;
  const followUp = document.getElementById("clFollowUp").value;

  const c = findCustomer(state.selectedId);
  c.lastContact = date;
  c.callLogs.push({ id:Date.now(), date, summary, needs, reaction, nextContact, followUp });
  state.followUps.push({ id:Date.now(), customerId:c.id, dueDate:nextContact, content:followUp, status:"pending" });

  state.modalOpen = false;
  state.aiResult = null;
  render();
  showToast("已儲存通話紀錄，並建立 Follow Up");
}

function openModal(){ state.modalOpen = true; state.aiResult = null; render(); }
function closeModal(){ state.modalOpen = false; state.aiResult = null; render(); }

/* ================================================================== */
/* AI 助理浮動面板                                                       */
/* ================================================================== */

function renderAssistant(){
  const fab = `<button class="assistant-fab" onclick="toggleAssistant()">${icon(state.assistantOpen?"x":"message",22)}</button>`;
  if(!state.assistantOpen) return fab;
  return fab + `
    <div class="assistant-panel">
      <div class="assistant-head">${icon("sparkles",16,"color:var(--accent)")}AI 助理</div>
      <div class="assistant-msgs" id="assistantMsgs">${renderAssistantMessages()}</div>
      <div class="assistant-input-row">
        <input type="text" id="assistantInput" placeholder="輸入問題…" onkeydown="if(event.key==='Enter') sendAssistant()" />
        <button class="send-btn" onclick="sendAssistant()">${icon("send",14)}</button>
      </div>
    </div>`;
}
function renderAssistantMessages(){
  return state.assistantMessages.map(m => `
    <div class="msg-row ${m.role}"><div class="msg-bubble ${m.role}">${esc(m.text)}</div></div>`).join("");
}
function sendAssistant(){
  const input = document.getElementById("assistantInput");
  const val = input.value.trim();
  if(!val) return;
  const matched = state.customers.find(c => val.includes(c.name));
  let reply;
  if(matched){
    const lastLog = matched.callLogs[matched.callLogs.length-1];
    reply = lastLog
      ? `${matched.name} 上次於 ${lastLog.date} 通話，內容摘要：「${lastLog.summary}」客戶反應為${lastLog.reaction}。目前標籤：${matched.tags.join("、")}。`
      : `${matched.name} 目前尚無通話紀錄。`;
  } else if(/資產.*成長|成長.*資產/.test(val)){
    reply = "目前偵測到王小明的 ETF 部位近一個月成長 12%，張家豪的高股息 ETF 本週成長 6%，可留意加碼或維繫聯繫。";
  } else {
    reply = "這個問題我還在學習中，你可以換個問法，或直接到「客戶管理」查看完整名單喔。";
  }
  state.assistantMessages.push({ role:"user", text:val });
  state.assistantMessages.push({ role:"ai", text:reply });
  input.value = "";
  const wrap = document.getElementById("assistantMsgs");
  wrap.innerHTML = renderAssistantMessages();
  wrap.scrollTop = wrap.scrollHeight;
}
function toggleAssistant(){ state.assistantOpen = !state.assistantOpen; render(); }

/* ================================================================== */
/* 事件處理函式（全域）                                                    */
/* ================================================================== */

function setView(v){ state.view = v; state.selectedId = null; state.bellOpen = false; detailTab = "basic"; render(); }
function openCustomer(id){ state.selectedId = id; state.view = "customerDetail"; state.bellOpen = false; detailTab = "basic"; render(); }
function toggleDark(){ state.dark = !state.dark; document.body.classList.toggle("dark", state.dark); render(); }
function toggleBell(){ state.bellOpen = !state.bellOpen; render(); }
function toggleTodo(id){ const t = state.todos.find(x=>x.id===id); if(t) t.done = !t.done; render(); }
function completeFollowUp(id){ const f = state.followUps.find(x=>x.id===id); if(f) f.status="done"; render(); showToast("Follow Up 已標記完成"); }
function callCustomer(name){ showToast(`正在撥打 ${name}…`); }
function addCustomerPlaceholder(){ showToast("示範原型：新增客戶表單可於此串接"); }
function changeCalMonth(delta){
  let m = state.cal.month + delta, y = state.cal.year;
  if(m < 0){ m = 11; y -= 1; } if(m > 11){ m = 0; y += 1; }
  state.cal.month = m; state.cal.year = y; render();
}
function gotoCalToday(){ state.cal.year = 2026; state.cal.month = 6; state.cal.selectedKey = toKey(TODAY); render(); }
function selectCalDay(key){ state.cal.selectedKey = key; render(); }

/* ================================================================== */
/* 主渲染函式                                                            */
/* ================================================================== */

function renderMainView(){
  if(state.view === "dashboard") return renderDashboard();
  if(state.view === "customers") return renderCustomers();
  if(state.view === "customerDetail") return renderCustomerDetail();
  if(state.view === "reminders") return renderReminders();
  if(state.view === "settings") return renderSettings();
  if(state.view === "calendar") return renderCalendar();
  if(state.view === "ai") return renderAIAssistantPage();
  return "";
}

function render(){
  document.body.classList.toggle("dark", state.dark);

  // 未登入：只渲染登入頁，不掛載 Sidebar / TopBar / 任何受保護內容
  if(!state.authUser){
    document.getElementById("app").innerHTML = renderLogin();
    renderToast();
    return;
  }

  document.getElementById("app").innerHTML = `
    ${renderSidebar()}
    <div class="main-col">
      ${renderTopBar()}
      <main>${renderMainView()}</main>
    </div>
    ${renderModal()}
    ${renderAssistant()}
  `;
  renderToast();
}

document.addEventListener("click", () => { if(state.bellOpen){ state.bellOpen = false; render(); } });

const toastDiv = document.createElement("div");
toastDiv.id = "toastWrap";
document.body.appendChild(toastDiv);

render();
</script>
</body>
</html>
